<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script src="./theme.js"></script>
    <title>Document Viewer</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/brand.css" />
    <link rel="stylesheet" href="./styles/homepage.css" />
    <link rel="stylesheet" href="./styles/chemistry-content.css" />
  </head>
  <body class="page-document">
    <div class="page-shell document-page-shell">
      <header class="hero document-hero">
        <p class="eyebrow document-breadcrumb">
          <a href="./index.html">Student Site</a>
          <span> / Document</span>
        </p>
        <h1 id="document-title">Loading document...</h1>
        <p id="document-description" class="hero-copy">Preparing integrated document content.</p>
        <div id="document-meta" class="meta-chip-row viewer-meta-row"></div>
      </header>

      <main class="document-layout viewer-layout">
        <aside class="sidebar-panel viewer-sidebar" aria-label="Document tools">
          <details class="sidebar-section sidebar-disclosure" data-mobile-collapsed="true" open>
            <summary class="sidebar-summary">
              <h2 id="toc-heading">On This Page</h2>
            </summary>
            <nav id="document-toc" class="document-toc" aria-labelledby="toc-heading" aria-live="polite">
              <p class="panel-copy">Loading page structure...</p>
            </nav>
          </details>

          <details
            id="syllabus-links-section"
            class="sidebar-section sidebar-disclosure"
            data-mobile-collapsed="true"
            hidden
            open
          >
            <summary class="sidebar-summary">
              <h2>Syllabus Links</h2>
            </summary>
            <div
              id="document-syllabus-links"
              class="meta-chip-row sidebar-chip-row viewer-meta-row viewer-meta-row-syllabus"
            ></div>
          </details>

          <details class="sidebar-section sidebar-disclosure" open>
            <summary class="sidebar-summary">
              <h2>Document File</h2>
            </summary>
            <p id="document-file-kind" class="panel-copy">Checking source format...</p>
            <div class="document-actions">
              <a id="raw-file-link" class="secondary-link viewer-action-link" href="#" target="_blank" rel="noreferrer">
                Open Raw File
              </a>
            </div>
          </details>
        </aside>

        <section class="library-panel document-panel viewer-panel" aria-live="polite">
          <div id="document-body" class="document-body" aria-busy="true">
            <div class="document-placeholder empty-state empty-state--viewer">
              <strong>Loading document...</strong>
              <p>The student-site viewer is preparing the shared layout and content fragment.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./document.js" defer></script>
  </body>
</html>
