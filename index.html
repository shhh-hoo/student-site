<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Library</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/chemistry-content.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Student Site</p>
        <h1>Document Library</h1>
        <p class="hero-copy">
          Browse document-type learning resources synced from the sibling
          <code>content-source/documents</code> folder.
        </p>
      </header>

      <main>
        <section class="library-panel" aria-labelledby="library-heading">
          <div class="panel-header">
            <div>
              <h2 id="library-heading">Available Documents</h2>
              <p id="library-status" class="panel-copy">Loading library data...</p>
            </div>
          </div>

          <div id="library-filters" class="filter-bar" hidden>
            <label class="filter-field" for="filter-stage">
              <span class="filter-label">Stage</span>
              <select
                id="filter-stage"
                class="filter-select"
                data-default-label="All stages"
              >
                <option value="">All stages</option>
              </select>
            </label>

            <label class="filter-field" for="filter-part">
              <span class="filter-label">Part</span>
              <select
                id="filter-part"
                class="filter-select"
                data-default-label="All parts"
              >
                <option value="">All parts</option>
              </select>
            </label>

            <div class="filter-field filter-field-wide">
              <div class="filter-toolbar">
                <span class="filter-label">Tags</span>
                <button
                  id="reset-filters"
                  class="secondary-link filter-reset"
                  type="button"
                >
                  Reset filters
                </button>
              </div>
              <div
                id="filter-tags"
                class="filter-tag-list"
                role="group"
                aria-label="Filter by tags"
              ></div>
            </div>
          </div>

          <div
            id="library-grid"
            class="library-grid"
            aria-live="polite"
            aria-busy="true"
          ></div>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
